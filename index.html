<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Focus On 3D | Non-Stop Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --card-color: #1a1a1a;
            --text-color: #1cb49c; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .container {
            display: grid;
            grid-template-rows: repeat(3, 1fr);
            justify-items: center;
            align-items: center;
            height: 100dvh; 
            width: 100%;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }

        .card {
            background-color: var(--card-color);
            width: 92vw;
            max-width: 500px;
            height: 90%; 
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            pointer-events: none;
        }

        .card::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 2px;
            background-color: var(--bg-color);
            top: 50%;
            transform: translateY(-50%);
            z-index: 5;
            opacity: 0.5;
        }

        .info-text {
            font-size: 2.2dvh; 
            font-weight: 700;
            position: absolute;
            top: 6%; 
            left: 50%;
            transform: translateX(-50%);
            letter-spacing: 1px;
            z-index: 10;
        }

        .time-text {
            font-size: 20dvh; 
            font-weight: 900; 
            line-height: 1;
            letter-spacing: -3px;
            z-index: 1;
            font-variant-numeric: tabular-nums;
        }

        #hint {
            position: fixed;
            bottom: 20px;
            font-size: 12px;
            opacity: 0.3;
            color: white;
            transition: opacity 0.5s;
        }

        @media (orientation: landscape) {
            .container {
                grid-template-rows: 1fr;
                grid-template-columns: repeat(3, 1fr);
                padding: 0 2vw;
            }
            .card {
                width: 92%;
                height: 85dvh;
            }
            .time-text {
                font-size: 45dvh;
            }
            .info-text {
                font-size: 4dvh;
                top: 8%;
            }
        }
    </style>
</head>
<body onclick="handleInteraction()">

    <div class="container">
        <div class="card">
            <div class="info-text" id="date-label">----.--.--</div>
            <div class="time-text" id="hours">00</div>
        </div>
        <div class="card">
            <div class="info-text" id="day-label">LOADING</div>
            <div class="time-text" id="minutes">00</div>
        </div>
        <div class="card">
            <div class="time-text" id="seconds">00</div>
        </div>
    </div>

    <div id="hint">點擊螢幕：進入全螢幕並保持常亮</div>

    <script>
        let wakeLock = null;

        function updateClock() {
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            document.getElementById('date-label').textContent = `${yyyy}.${mm}.${dd}`;

            const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            document.getElementById('day-label').textContent = days[now.getDay()];

            document.getElementById('hours').textContent = String(now.getHours()).padStart(2, '0');
            document.getElementById('minutes').textContent = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('seconds').textContent = String(now.getSeconds()).padStart(2, '0');

            if (document.fullscreenElement) {
                document.getElementById('hint').style.opacity = "0";
            } else {
                document.getElementById('hint').style.opacity = "0.3";
            }
        }

        // 核心功能：請求螢幕常亮鎖定
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('螢幕常亮已啟動');
                }
            } catch (err) {
                console.error(`無法啟動常亮: ${err.message}`);
            }
        }

        function handleInteraction() {
            // 1. 請求全螢幕
            const docElm = document.documentElement;
            if (!document.fullscreenElement) {
                if (docElm.requestFullscreen) {
                    docElm.requestFullscreen();
                } else if (docElm.webkitRequestFullScreen) {
                    docElm.webkitRequestFullScreen();
                }
            }
            
            // 2. 啟動螢幕常亮
            requestWakeLock();
        }

        // 當頁面從背景回到前景時，重新申請鎖定（部分手機會自動釋放）
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
