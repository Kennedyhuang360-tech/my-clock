<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Focus On 3D | Real-Weather Meteor Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --card-color: #1a1a1a;
            --text-color: #1cb49c; 
            --beam-glow: #00fff2;
            --screen-radius: 40px; 
            --track-width: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%; width: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .stage {
            position: relative;
            width: 100vw; height: 100vh;
            background: var(--bg-color);
            overflow: hidden; 
            border-radius: var(--screen-radius); 
        }

        .meteor-disk {
            position: absolute;
            top: 50%; left: 50%;
            width: 250vmax; height: 250vmax;
            margin-left: -125vmax; margin-top: -125vmax;
            background: conic-gradient(from 0deg, transparent 75%, var(--beam-glow) 95%, #fff 100%);
            animation: rotate 30s linear infinite; 
            z-index: 1;
        }

        .inner-mask {
            position: absolute;
            inset: var(--track-width);
            background: var(--bg-color);
            border-radius: calc(var(--screen-radius) - var(--track-width));
            z-index: 2;
        }

        .main-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            height: 100%; width: 100%;
            padding: calc(var(--track-width) + 5px) 0;
            gap: 8px;
        }

        .time-box {
            position: relative;
            width: 90vw;
            max-width: 550px;
            flex: 1; 
            background: var(--card-color);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 1px solid rgba(28, 180, 156, 0.1);
            overflow: hidden;
        }

        .top-info {
            font-size: 2dvh;
            font-weight: 700;
            position: absolute;
            top: 6%;
            width: 85%;
            display: flex;
            justify-content: space-between;
            color: var(--text-color);
            letter-spacing: 1px;
            opacity: 0.9;
            z-index: 5;
        }

        .time-text {
            position: relative;
            font-size: 19dvh; 
            font-weight: 900;
            line-height: 1;
            color: var(--text-color);
            font-variant-numeric: tabular-nums;
            letter-spacing: -5px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            transform: translateY(10%);
        }

        .time-text::after {
            content: "";
            position: absolute;
            left: 0; top: 48%;
            width: 100%;
            height: 2px;
            background: rgba(0, 0, 0, 0.85);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.05);
            z-index: 10;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        @media (orientation: landscape) {
            .main-container { flex-direction: row; padding: 20px 40px; gap: 15px; }
            .time-box { height: 85dvh; flex: 1; }
            .time-text { font-size: 42dvh; letter-spacing: -10px; }
        }
    </style>
</head>
<body onclick="handleInteraction()">

    <div class="stage">
        <div class="meteor-disk" id="rotator"></div>
        <div class="inner-mask"></div>

        <div class="main-container">
            <div class="time-box">
                <div class="top-info">
                    <span id="date-label">----.--.--</span>
                    <span id="weather-label">氣溫 取得中</span>
                </div>
                <div id="hours" class="time-text">00</div>
            </div>

            <div class="time-box">
                <div class="top-info">
                    <span id="day-label">----</span>
                    <span id="hum-label">濕度 取得中</span>
                </div>
                <div id="minutes" class="time-text">00</div>
            </div>

            <div class="time-box">
                <div id="seconds" class="time-text">00</div>
            </div>
        </div>
    </div>

    <script>
        const rotator = document.getElementById('rotator');

        function updateClock() {
            const now = new Date();
            const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            
            document.getElementById('date-label').textContent = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
            document.getElementById('day-label').textContent = days[now.getDay()];
            document.getElementById('hours').textContent = String(now.getHours()).padStart(2, '0');
            document.getElementById('minutes').textContent = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('seconds').textContent = String(now.getSeconds()).padStart(2, '0');
            
            const hue = (now.getSeconds() * 6 + now.getMilliseconds() / 166) % 360;
            const color = `hsl(${hue}, 100%, 60%)`;
            document.documentElement.style.setProperty('--beam-glow', color);
            rotator.style.filter = `drop-shadow(0 0 20px ${color})`;
        }

        async function fetchWeather(lat, lon) {
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code`);
                const data = await response.json();
                
                const temp = Math.round(data.current.temperature_2m);
                const hum = data.current.relative_humidity_2m;
                const code = data.current.weather_code;

                // 簡單的天氣代碼對照
                let desc = "晴";
                if (code > 0 && code <= 3) desc = "多雲";
                if (code >= 45 && code <= 48) desc = "有霧";
                if (code >= 51) desc = "有雨";

                document.getElementById('weather-label').textContent = `${temp}°C ${desc}`;
                document.getElementById('hum-label').textContent = `濕度 ${hum}%`;
            } catch (e) {
                console.error("Weather error", e);
            }
        }

        function updateWeather() {
            // 嘗試使用經緯度定位，更精準
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => fetchWeather(pos.coords.latitude, pos.coords.longitude),
                    () => {
                        // 如果用戶拒絕定位，改用 IP 定位 (由 Open-Meteo 自動處理或預設台北)
                        fetchWeather(25.03, 121.56); // 預設台北
                    }
                );
            } else {
                fetchWeather(25.03, 121.56);
            }
        }

        async function handleInteraction() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').catch(() => {});
            }
        }

        setInterval(updateClock, 50);
        setInterval(updateWeather, 600000); // 10 分鐘更新一次
        updateClock();
        updateWeather();
    </script>
</body>
</html>
